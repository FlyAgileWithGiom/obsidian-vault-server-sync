name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach assets to (e.g. v1.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # build:release produces the single self-contained CJS bundle BRAT installs
      # (dist/release/main.js). NOT `npm run build`: that ESM+splitting build pulls
      # pouchdb-browser's ESM entry (import EE from 'events'), which esbuild cannot
      # resolve for the browser target -> the release build died on every tag since
      # v2.0.0. build:release resolves pouchdb-browser's CJS entry and has no such
      # bare Node-builtin import.
      - name: Build release bundle
        run: npm run build:release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/release/main.js
            dist/release/manifest.json
            dist/release/styles.css
